<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MilnCloudLog</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2/dist/chartjs-plugin-zoom.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;padding:0;max-width:720px;margin:0 auto}
nav{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #222;margin-bottom:12px}
.nav-brand{color:#ff7700;font-weight:700;font-size:1.1em;flex:1}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:none;border:1px solid #333;color:#888;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:.85em;transition:all .15s}
.nav-tab:hover{border-color:#555;color:#ccc}
.nav-tab.active{background:#ff7700;border-color:#ff7700;color:#fff;font-weight:600}
.main{padding:0 12px 16px}
.card{background:#222;border-radius:10px;padding:14px;margin-bottom:10px}
.firing-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #2a2a2a;cursor:pointer;border-radius:6px;transition:background .1s}
.firing-row:last-child{border-bottom:none}
.firing-row:hover{background:#2a2a2a}
.fid{background:#2a2a2a;border-radius:5px;padding:3px 9px;font-size:.8em;font-family:monospace;color:#ff9933;white-space:nowrap}
.fmeta{flex:1;font-size:.84em;color:#888}
.fmax{font-size:1em;font-weight:700;color:#ff7700;white-space:nowrap}
.ferr{font-size:.75em;color:#ff5555;margin-left:4px}
.back{color:#ff7700;cursor:pointer;font-size:.9em;margin-bottom:10px;display:inline-block}
.back:hover{text-decoration:underline}
canvas{display:block;width:100%}
.tbl-wrap{overflow-x:auto;max-height:320px;overflow-y:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.78em;min-width:340px}
th{text-align:left;padding:5px 6px;color:#666;font-weight:normal;border-bottom:1px solid #333;position:sticky;top:0;background:#222}
td{padding:5px 6px;border-bottom:1px solid #1e1e1e}
.live-badge{background:#1a3010;color:#88cc44;border-radius:5px;padding:2px 9px;font-size:.78em;margin-left:8px}
.st-badge{display:inline-block;border-radius:5px;padding:2px 9px;font-size:.78em;margin-left:8px;white-space:nowrap}
.st-done{background:#13261a;color:#5fbf7a}
.st-stopped{background:#2a2317;color:#caa45a}
.st-estop{background:#2a1010;color:#ff6666}
.st-disc{background:#241c10;color:#cc9944}
.btn-csv{background:none;border:1px solid #ff7700;color:#ff7700;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:.82em;transition:all .15s}
.btn-csv:hover{background:#ff7700;color:#fff}
.btn-zoom{background:none;border:1px solid #333;color:#888;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:.78em}
.btn-zoom:hover{border-color:#555;color:#ccc}
.pill{display:inline-block;background:#2a2a2a;border-radius:5px;padding:3px 10px;font-size:.82em;margin:2px}
.pill b{color:#ff9933}
#msg{text-align:center;color:#555;padding:24px}
.logout{font-size:.78em;color:#555;cursor:pointer;padding:2px 0}
.logout:hover{color:#ff7700}
.time-sel{display:flex;gap:6px;margin-bottom:12px}
.tsel{background:#2a2a2a;border:1px solid #333;color:#888;border-radius:6px;padding:4px 14px;cursor:pointer;font-size:.84em;transition:all .15s}
.tsel:hover{border-color:#555;color:#ccc}
.tsel.active{background:#ff7700;border-color:#ff7700;color:#fff;font-weight:600}
.state-badge{display:inline-block;border-radius:4px;padding:1px 7px;font-size:.75em;font-weight:600;margin-left:4px}
.state-IDLE{background:#1e2a1e;color:#66aa66}
.state-RAMP{background:#2a1e10;color:#ff9933}
.state-HOLD{background:#1e1e2a;color:#6688ff}
.state-COOL{background:#102028;color:#44aacc}
.state-ERROR{background:#2a1010;color:#ff5555}
.batch-row{cursor:pointer}
.batch-row:hover td{background:#2a2a2a}
.batch-row.open td{background:#1e1e1e}
.batch-detail td{padding:0;background:#1a1a1a}
.batch-detail-inner{padding:10px 8px 12px}
.raw-tbl-wrap{overflow-y:auto;max-height:220px;margin-top:10px}
.raw-tbl-wrap table{min-width:unset;width:100%}
.raw-tbl-wrap td{font-family:monospace;font-size:.8em;padding:3px 8px;border-bottom:1px solid #1e1e1e}
.raw-tbl-wrap td:last-child{color:#ff9933;text-align:right}
</style>
</head>
<body>

<nav>
  <span class="nav-brand">🔥 MilnCloudLog</span>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-firings" onclick="showTab('firings')">Brenninger</button>
    <button class="nav-tab" id="tab-tc" onclick="showTab('tc')">TC-logg</button>
    <a class="nav-tab" href="docs.html" style="text-decoration:none">📖 Hjelp</a>
  </div>
  <span class="logout" onclick="logout()">Logg ut</span>
</nav>

<div class="main">

  <!-- ── Firings list ── -->
  <div id="view-list">
    <div class="card">
      <div id="msg">Laster brenninger…</div>
      <div id="list"></div>
    </div>
  </div>

  <!-- ── Firing detail ── -->
  <div id="view-detail" style="display:none"></div>

  <!-- ── TC log ── -->
  <div id="view-tc" style="display:none">
    <div class="card">
      <div class="time-sel">
        <button class="tsel active" onclick="loadTcLog(1,this)">1t</button>
        <button class="tsel" onclick="loadTcLog(6,this)">6t</button>
        <button class="tsel" onclick="loadTcLog(24,this)">24t</button>
      </div>
      <div id="tc-stats" style="color:#555;font-size:.84em">Laster…</div>
    </div>
    <div class="card" style="padding:8px">
      <div style="text-align:right;margin-bottom:4px"><button class="btn-zoom" onclick="tcChart && tcChart.resetZoom()">Tilbakestill zoom</button></div>
      <canvas id="tc-cv" height="200"></canvas>
    </div>
    <div class="card" style="padding:10px 8px">
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Mottatt</th><th>Tilstand</th><th>Samples</th><th>Siste temp</th>
          </tr></thead>
          <tbody id="tc-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /main -->

<script>
const API = 'https://miln-api.azurewebsites.net';

let token        = null;
let liveTimer    = null;
let chart        = null;
let tcChart      = null;
let tcBatches    = [];
let detailCharts = new Map();
let firingsById  = {};          // firing_id -> row (carries ended_at / end_reason)
let curFiring    = { id: null, data: [] };

const LIVE_WINDOW_MS = 3 * 60 * 1000;
const DISC_WINDOW_MS = 6 * 60 * 60 * 1000;   // beyond this, a firing with no end signal is just history

// Firing status from a row carrying ended_at/end_reason and a last-activity time:
//   ended (explicit signal) · live (fresh points) · disconnected (recently
//   stale, no end signal) · old (long stale → treated as history, no badge).
function firingStatus(endedAt, endReason, lastActivity) {
  if (endedAt) return { kind: 'ended', reason: endReason || 'completed' };
  const age = lastActivity ? Date.now() - new Date(lastActivity) : Infinity;
  if (age < LIVE_WINDOW_MS) return { kind: 'live' };
  if (age < DISC_WINDOW_MS) return { kind: 'disconnected' };
  return { kind: 'old' };
}

function statusBadge(st) {
  switch (st.kind) {
    case 'live': return '<span class="live-badge">● LIVE</span>';
    case 'disconnected': return '<span class="st-badge st-disc">⚠ Frakoblet</span>';
    case 'ended':
      if (st.reason === 'estop')   return '<span class="st-badge st-estop">⚠ Nødstopp</span>';
      if (st.reason === 'stopped') return '<span class="st-badge st-stopped">■ Stoppet</span>';
      return '<span class="st-badge st-done">✓ Fullført</span>';
  }
  return '';   // 'old' → no badge
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function init() {
  const params   = new URLSearchParams(location.search);
  const urlToken = params.get('token');
  if (urlToken) {
    if (await verifyToken(urlToken)) {
      token = urlToken;
      localStorage.setItem('miln_token', token);
      history.replaceState({}, '', location.pathname);
    } else { redirect(); return; }
  } else {
    token = localStorage.getItem('miln_token');
    if (!token || !(await verifyToken(token))) { redirect(); return; }
  }
  loadFirings();
}

async function verifyToken(t) {
  try {
    const r = await fetch(`${API}/api/auth/verify?token=${encodeURIComponent(t)}`);
    return r.ok;
  } catch { return false; }
}

function redirect() { location.href = 'login.html'; }
function logout() { localStorage.removeItem('miln_token'); redirect(); }

// ── Navigation ────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tab-firings').classList.toggle('active', tab === 'firings');
  document.getElementById('tab-tc').classList.toggle('active', tab === 'tc');

  const showFirings = tab === 'firings';
  document.getElementById('view-list').style.display    = showFirings ? '' : 'none';
  document.getElementById('view-detail').style.display  = 'none';
  document.getElementById('view-tc').style.display      = showFirings ? 'none' : '';

  if (tab === 'tc') loadTcLog(1, document.querySelector('.tsel'));
  if (tab === 'firings') loadFirings();
}

// ── API helper ────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(`${API}/api/${path}`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (r.status === 401) { redirect(); return null; }
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

// ── Firings list ──────────────────────────────────────────────────────────────
async function loadFirings() {
  const data = await apiFetch('firings');
  if (!data) return;

  const msg  = document.getElementById('msg');
  const list = document.getElementById('list');

  if (!data.length) { msg.textContent = 'Ingen brenninger registrert ennå.'; return; }
  msg.style.display = 'none';

  firingsById = {};
  data.forEach(f => { firingsById[f.firing_id] = f; });

  list.innerHTML = data.map(f => {
    const date = new Date(f.started_at).toLocaleDateString('no-NO', { day:'2-digit', month:'2-digit', year:'numeric' });
    const time = new Date(f.started_at).toLocaleTimeString('no-NO', { hour:'2-digit', minute:'2-digit' });
    const st   = firingStatus(f.ended_at, f.end_reason, f.last_seen_at);
    return `<div class="firing-row" onclick="loadFiring(${f.firing_id})">
      <span class="fid">#${f.firing_id}</span>
      <span class="fmeta">${date} ${time}&ensp;·&ensp;${f.point_count} pt${statusBadge(st)}</span>
      <span class="fmax">${f.max_temp_c ? Math.round(f.max_temp_c) + '°C' : '--'}${f.had_error ? '<span class="ferr">⚠</span>' : ''}</span>
    </div>`;
  }).join('');
}

// ── Firing detail ─────────────────────────────────────────────────────────────
async function loadFiring(id) {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  if (chart)     { chart.destroy(); chart = null; }

  document.getElementById('view-list').style.display = 'none';
  const view = document.getElementById('view-detail');
  view.style.display = 'block';
  view.innerHTML = '<div class="card"><div style="color:#555;text-align:center;padding:24px">Laster…</div></div>';

  const data = await apiFetch(`firing/${id}`);
  if (!data) return;
  renderFiring(id, data);

  if (data.length) {
    const last = new Date(data[data.length - 1].ts);
    if (Date.now() - last < 3 * 60 * 1000) {
      liveTimer = setInterval(async () => {
        const fresh = await apiFetch(`firing/${id}`);
        if (fresh) renderFiring(id, fresh);
      }, 60_000);
    }
  }
}

function renderFiring(id, data) {
  if (chart) { chart.destroy(); chart = null; }
  curFiring = { id, data };
  const view   = document.getElementById('view-detail');
  const row     = firingsById[id];
  const lastTs  = data.length ? data[data.length - 1].ts : (row && row.last_seen_at);
  const st      = firingStatus(row && row.ended_at, row && row.end_reason, lastTs);
  const badge   = statusBadge(st);
  const maxTemp  = data.reduce((m, p) => Math.max(m, p.temp_c || 0), 0);
  const lastSec  = data.length ? (data[data.length - 1].sec_elapsed || 0) : 0;
  const h = Math.floor(lastSec / 3600), m = Math.floor((lastSec % 3600) / 60);

  view.innerHTML = `
    <span class="back" onclick="backToList()">← Alle brenninger</span>
    <div class="card">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        <span style="color:#ff7700;font-weight:700;font-size:1.1em">Brenning #${id}</span>
        ${badge}
        <button class="btn-csv" style="margin-left:auto" onclick="downloadFiringCsv()"${data.length ? '' : ' disabled'}>⬇ Last ned CSV</button>
      </div>
      <span class="pill">Maks: <b>${Math.round(maxTemp)}°C</b></span>
      <span class="pill">Varighet: <b>${h}t ${m}m</b></span>
      <span class="pill">Datapunkter: <b>${data.length}</b></span>
    </div>
    <div class="card" style="padding:8px">
      <div style="text-align:right;margin-bottom:4px"><button class="btn-zoom" onclick="chart && chart.resetZoom()">Tilbakestill zoom</button></div>
      <canvas id="cv" height="200"></canvas>
    </div>
    <div class="card" style="padding:10px 8px">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Klokke</th><th>Tid</th><th>Temp</th><th>SP</th><th>Duty%</th><th>Relé</th><th>Segment</th></tr></thead>
          <tbody id="dtbody"></tbody>
        </table>
      </div>
    </div>`;

  const labels = data.map(p => {
    if (p.sec_elapsed != null) {
      const h = Math.floor(p.sec_elapsed/3600), m = Math.floor((p.sec_elapsed%3600)/60), s = p.sec_elapsed%60;
      return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
    }
    return new Date(p.ts).toLocaleTimeString('no-NO', { hour:'2-digit', minute:'2-digit' });
  });

  chart = new Chart(document.getElementById('cv'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Temp °C', data: data.map(p => p.temp_c), borderColor: '#ff7700', backgroundColor: 'rgba(255,119,0,.07)', borderWidth: 2, pointRadius: data.length > 80 ? 0 : 2, tension: 0.25, fill: true },
        { label: 'Settpunkt °C', data: data.map(p => p.setpoint_c), borderColor: '#4488ff', borderWidth: 1.5, borderDash: [5,3], pointRadius: 0, tension: 0.25 },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { ticks: { color: '#555', maxTicksLimit: 10 }, grid: { color: '#2a2a2a' } },
        y: { ticks: { color: '#555' }, grid: { color: '#2a2a2a' } },
      },
      plugins: {
        legend: { labels: { color: '#aaa', boxWidth: 14 } },
        zoom: {
          pan:  { enabled: true, mode: 'x' },
          zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
        },
      },
    },
  });

  document.getElementById('dtbody').innerHTML = [...data].reverse().map(p => {
    const clock   = new Date(p.ts).toLocaleTimeString('no-NO', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const elapsed = p.sec_elapsed != null ? (() => {
      const h=Math.floor(p.sec_elapsed/3600), m=Math.floor((p.sec_elapsed%3600)/60), s=p.sec_elapsed%60;
      return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
    })() : '--';
    return `<tr${p.is_err ? ' style="color:#ff5555"' : ''}>
      <td style="color:#555">${clock}</td><td>${elapsed}</td>
      <td><b>${p.temp_c != null ? Number(p.temp_c).toFixed(1) : '--'}°C</b></td>
      <td style="color:#888">${p.setpoint_c != null ? Number(p.setpoint_c).toFixed(1) : '--'}°C</td>
      <td>${p.duty_pct ?? '--'}%</td>
      <td>${p.relay ? '🔴' : '⚪'}</td>
      <td style="color:#777;font-size:.9em">${p.segment || ''}</td>
    </tr>`;
  }).join('');
}

function backToList() {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  if (chart)     { chart.destroy(); chart = null; }
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-list').style.display   = '';
}

// ── CSV export ────────────────────────────────────────────────────────────────
function downloadFiringCsv() {
  const { id, data } = curFiring;
  if (!data || !data.length) return;

  const cols = ['ts', 'sec_elapsed', 'temp_c', 'setpoint_c', 'relay', 'duty_pct', 'segment', 'is_err'];
  const esc  = v => {
    if (v == null) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const csv = cols.join(',') + '\n' +
    data.map(p => cols.map(c => esc(p[c])).join(',')).join('\n') + '\n';

  const d     = new Date(data[0].ts);
  const stamp = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  const blob  = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a     = document.createElement('a');
  a.href      = URL.createObjectURL(blob);
  a.download  = `brenning-${id}-${stamp}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// ── TC log ────────────────────────────────────────────────────────────────────
function expandBatches(batches) {
  const points = [];
  for (const b of batches) {
    const n          = b.readings.length;
    const intervalMs = b.sample_interval_ms || 1000;
    const endMs      = new Date(b.received_at).getTime();
    for (let i = 0; i < n; i++) {
      points.push({
        ts:     new Date(endMs - (n - 1 - i) * intervalMs),
        temp_c: b.readings[i],
        state:  b.state,
      });
    }
  }
  return points;
}

function downsample(points, maxPts) {
  if (points.length <= maxPts) return points;
  const step = Math.ceil(points.length / maxPts);
  return points.filter((_, i) => i % step === 0);
}

async function loadTcLog(hours, btn) {
  if (btn) {
    document.querySelectorAll('.tsel').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  document.getElementById('tc-stats').textContent = 'Laster…';
  if (tcChart) { tcChart.destroy(); tcChart = null; }

  const data = await apiFetch(`tc-log?hours=${hours}`);
  if (!data) return;

  const { batches } = data;
  tcBatches = [...batches].reverse();
  detailCharts.forEach(c => c.destroy());
  detailCharts.clear();

  if (!batches.length) {
    document.getElementById('tc-stats').textContent = 'Ingen data i valgt tidsrom.';
    document.getElementById('tc-tbody').innerHTML = '';
    return;
  }

  const points = downsample(expandBatches(batches), 2000);
  const lastTemp = batches[batches.length - 1].readings.at(-1);
  const firstTs  = points[0].ts;
  const lastTs   = points[points.length - 1].ts;

  document.getElementById('tc-stats').innerHTML =
    `<span class="pill">Siste: <b>${lastTemp}°C</b></span>` +
    `<span class="pill">Batches: <b>${batches.length}</b></span>` +
    `<span class="pill">Fra: <b>${firstTs.toLocaleTimeString('no-NO', {hour:'2-digit',minute:'2-digit'})}</b></span>` +
    `<span class="pill">Til: <b>${lastTs.toLocaleTimeString('no-NO', {hour:'2-digit',minute:'2-digit'})}</b></span>`;

  tcChart = new Chart(document.getElementById('tc-cv'), {
    type: 'line',
    data: {
      labels: points.map(p => p.ts.toLocaleTimeString('no-NO', { hour:'2-digit', minute:'2-digit' })),
      datasets: [{
        label: 'Temp °C',
        data: points.map(p => p.temp_c),
        borderColor: '#ff7700',
        backgroundColor: 'rgba(255,119,0,.07)',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.2,
        fill: true,
      }],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { ticks: { color: '#555', maxTicksLimit: 8 }, grid: { color: '#2a2a2a' } },
        y: { ticks: { color: '#555' }, grid: { color: '#2a2a2a' } },
      },
      plugins: {
        legend: { display: false },
        zoom: {
          pan:  { enabled: true, mode: 'x' },
          zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
        },
      },
    },
  });

  document.getElementById('tc-tbody').innerHTML = tcBatches.map((b, i) => {
    const ts      = new Date(b.received_at).toLocaleTimeString('no-NO', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const lastT   = b.readings.at(-1);
    const stClass = `state-${(b.state || 'IDLE').toUpperCase()}`;
    return `<tr class="batch-row" onclick="toggleBatchDetail(${i})">
      <td style="color:#555">${ts}</td>
      <td><span class="state-badge ${stClass}">${b.state || '—'}</span></td>
      <td>${b.readings.length}</td>
      <td><b>${lastT}°C</b></td>
    </tr>
    <tr class="batch-detail" id="bd-${i}" style="display:none">
      <td colspan="4"><div class="batch-detail-inner">
        <canvas id="bdc-${i}" height="140"></canvas>
        <div class="raw-tbl-wrap" id="bdt-${i}"></div>
      </div></td>
    </tr>`;
  }).join('');
}

// ── TC batch drill-down ───────────────────────────────────────────────────────
function toggleBatchDetail(idx) {
  const detailRow = document.getElementById(`bd-${idx}`);
  const batchRow  = detailRow.previousElementSibling;
  const isOpen    = detailRow.style.display !== 'none';

  if (isOpen) {
    detailRow.style.display = 'none';
    batchRow.classList.remove('open');
    if (detailCharts.has(idx)) { detailCharts.get(idx).destroy(); detailCharts.delete(idx); }
    return;
  }

  detailRow.style.display = '';
  batchRow.classList.add('open');

  const b          = tcBatches[idx];
  const n          = b.readings.length;
  const intervalMs = b.sample_interval_ms || 1000;
  const endMs      = new Date(b.received_at).getTime();
  const labels     = b.readings.map((_, i) => {
    const ts = new Date(endMs - (n - 1 - i) * intervalMs);
    return ts.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  });

  const c = new Chart(document.getElementById(`bdc-${idx}`), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Temp °C',
        data: b.readings,
        borderColor: '#ff9933',
        backgroundColor: 'rgba(255,153,51,.08)',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.2,
        fill: true,
      }],
    },
    options: {
      responsive: true,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { ticks: { color: '#555', maxTicksLimit: 6 }, grid: { color: '#2a2a2a' } },
        y: { ticks: { color: '#555' }, grid: { color: '#2a2a2a' } },
      },
      plugins: { legend: { display: false } },
    },
  });
  detailCharts.set(idx, c);

  document.getElementById(`bdt-${idx}`).innerHTML =
    `<table><thead><tr><th>Tid</th><th style="text-align:right">Temp</th></tr></thead><tbody>` +
    b.readings.map((temp, i) => {
      const ts = new Date(endMs - (n - 1 - i) * intervalMs)
        .toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      return `<tr><td>${ts}</td><td>${temp}°C</td></tr>`;
    }).join('') +
    `</tbody></table>`;
}

init();
</script>

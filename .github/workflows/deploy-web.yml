name: Deploy MilnCloudLog frontend

on:
  push:
    branches: [main]
    paths:
      - 'cloud/web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MILN_WEB }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: cloud/web
          skip_app_build: true
